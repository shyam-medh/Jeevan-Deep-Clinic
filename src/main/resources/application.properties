# Tomcat Server Port
server.port=8081

# Allow larger payloads for Base64 image uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# Trust Nginx reverse proxy headers (fixes 400 Bad Request behind proxy)
server.forward-headers-strategy=native

# H2 Database Settings (Persistent File-Based Database)
spring.datasource.url=jdbc:h2:file:./clinic_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator Health Check exposure
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# H2 Web Console (Default for local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================================================
# MYSQL PRODUCTION PROFILE
# ==============================================================================
# Activate this using: --spring.profiles.active=mysql
# ==============================================================================
spring.config.activate.on-profile=mysql

# MySQL Settings (Environment variables set via Docker Compose)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clinic_db}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL JPA Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
