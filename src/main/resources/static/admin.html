<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard | Jeevan Deep Clinic</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1UGjRCWZdcv-0BeZFUEv7Lt-TMB8UGQ8",
            authDomain: "jeevan-deep-clinic.firebaseapp.com",
            projectId: "jeevan-deep-clinic",
            storageBucket: "jeevan-deep-clinic.firebasestorage.app",
            messagingSenderId: "430805836459",
            appId: "1:430805836459:web:8a9462b96ffae6bc3c4dee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make functions globally available for inline onclick handlers
        window.db = db;
        window.getDocs = getDocs;
        window.collection = collection;
        window.query = query;
        window.orderBy = orderBy;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.addDoc = addDoc;
        window.doc = doc;
        window.serverTimestamp = serverTimestamp;
    </script>

    <style>
        :root {
            --primary: #0f4c81;
            --primary-light: #e6f0fa;
            --secondary: #10b981;
            --white: #ffffff;
            --bg-light: #f8fafc;
            --text-main: #334155;
            --border-color: #e2e8f0;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            font-family: 'Inter', sans-serif;
        }

        body { margin: 0; background-color: var(--bg-light); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: var(--white); padding: 20px 40px; box-shadow: var(--shadow-md); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--primary); margin: 0; display: flex; align-items: center; gap: 10px; }
        
        #login-screen { display: flex; flex: 1; align-items: center; justify-content: center; }
        .login-card { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: var(--shadow-md); width: 100%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid var(--border-color); border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #0c3e69; }
        .btn-sm { padding: 6px 12px; font-size: 0.85rem; }
        .btn-success { background: var(--secondary); }
        .btn-danger { background: #ef4444; }

        #dashboard-screen { display: none; padding: 40px; flex: 1; }
        .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); }
        .tab-btn { background: none; border: none; font-size: 1.1rem; font-weight: 600; color: #94a3b8; cursor: pointer; padding: 10px 15px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .table-container { background: var(--white); border-radius: 12px; box-shadow: var(--shadow-md); overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        th { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; background: var(--primary-light); color: var(--primary); }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef08a; color: #854d0e; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: #166534; color: white; padding: 12px 22px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; z-index: 9999; }
    </style>
</head>

<body>
    <div id="toast"></div>

    <div class="header">
        <h1><i data-lucide="shield"></i> Clinic Portal</h1>
        <div id="logout-btn" style="display:none; cursor:pointer; color: #ef4444;" onclick="logout()">
            <i data-lucide="log-out"></i> Logout
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen">
        <form class="login-card" onsubmit="login(event)">
            <i data-lucide="lock" style="color: var(--primary); width: 48px; height: 48px;"></i>
            <h2 style="color: var(--primary);">Doctor Login</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Enter passcode to manage website.</p>
            <input type="password" id="passcode" placeholder="Passcode (try: admin123)" required>
            <button class="btn" style="width: 100%;" type="submit">Access Dashboard</button>
            <p id="error-msg" style="color: red; display: none; margin-top:10px;">Incorrect passcode</p>
        </form>
    </div>

    <!-- Dashboard -->
    <div id="dashboard-screen">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('appointments')">Appointments</button>
            <button class="tab-btn" onclick="switchTab('questions')">Q&A</button>
            <button class="tab-btn" onclick="switchTab('reviews')">Reviews</button>
            <button class="tab-btn" onclick="switchTab('blogs')">Blogs</button>
        </div>

        <!-- Appointments -->
        <div id="tab-appointments" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Upcoming Appointments</h2>
                <button onclick="fetchAppointments()" class="btn btn-sm"><i data-lucide="refresh-cw"></i> Refresh</button>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Date</th><th>Patient</th><th>Phone</th><th>Slot</th><th>Message</th></tr></thead>
                    <tbody id="apt-table"></tbody>
                </table>
            </div>
        </div>

        <!-- Questions -->
        <div id="tab-questions" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Patient Questions</h2>
                <button onclick="fetchQuestions()" class="btn btn-sm"><i data-lucide="refresh-cw"></i> Refresh</button>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Date</th><th>Patient</th><th>Question</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="qa-table"></tbody>
                </table>
            </div>
        </div>

        <!-- Reviews -->
        <div id="tab-reviews" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Patient Reviews</h2>
                <button onclick="fetchReviews()" class="btn btn-sm"><i data-lucide="refresh-cw"></i> Refresh</button>
            </div>
            <div class="table-container">
                <table>
                    <thead><tr><th>Patient</th><th>Rating</th><th>Review</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="reviews-table"></tbody>
                </table>
            </div>
        </div>

        <!-- Blogs -->
        <div id="tab-blogs" class="tab-content">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Manage Blogs</h2>
            
            <form onsubmit="addBlog(event)" style="background: white; padding: 20px; border-radius: 12px; margin-bottom:20px; box-shadow: var(--shadow-md);">
                <h3>Add New Blog</h3>
                <input type="text" id="b-title" placeholder="Title" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px;">
                <input type="text" id="b-category" placeholder="Category" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px;">
                <input type="url" id="b-image" placeholder="Image URL" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px;">
                <textarea id="b-excerpt" placeholder="Short Excerpt" required rows="2" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px;"></textarea>
                <button class="btn btn-success" type="submit">Publish Blog</button>
            </form>

            <div class="table-container">
                <table>
                    <thead><tr><th>Title</th><th>Category</th><th>Action</th></tr></thead>
                    <tbody id="blogs-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // Simple Static Login
        function login(e) {
            e.preventDefault();
            if(document.getElementById('passcode').value === 'admin123') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                fetchAppointments();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'none';
            document.getElementById('passcode').value = '';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.target.classList.add('active');
            
            if(tabId === 'appointments') fetchAppointments();
            if(tabId === 'questions') fetchQuestions();
            if(tabId === 'reviews') fetchReviews();
            if(tabId === 'blogs') fetchBlogs();
        }

        // --- Fetch Logic ---
        async function fetchAppointments() {
            const t = document.getElementById('apt-table');
            t.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            try {
                const q = window.query(window.collection(window.db, "appointments"), window.orderBy("createdAt", "desc"));
                const snap = await window.getDocs(q);
                t.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    t.innerHTML += `<tr>
                        <td>${d.createdAt?.toDate().toLocaleDateString() || 'New'}</td>
                        <td><strong>${d.name}</strong></td>
                        <td>${d.phone}</td>
                        <td>${d.preferredDate} <br><small>${d.preferredTime}</small></td>
                        <td>${d.message}</td>
                    </tr>`;
                });
                if(snap.empty) t.innerHTML = '<tr><td colspan="5">No appointments yet.</td></tr>';
            } catch(e) { console.error(e); t.innerHTML = '<tr><td colspan="5">Error loading data.</td></tr>'; }
        }

        async function fetchQuestions() {
            const t = document.getElementById('qa-table');
            t.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            try {
                const q = window.query(window.collection(window.db, "questions"), window.orderBy("createdAt", "desc"));
                const snap = await window.getDocs(q);
                t.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    const status = d.answered ? '<span class="badge badge-success">Answered</span>' : '<span class="badge badge-warning">Pending</span>';
                    const action = d.answered ? `<small>${d.answerText}</small>` : `
                        <input type="text" id="ans-${id}" placeholder="Type answer..." style="padding:4px; width:150px;">
                        <button onclick="answerQuestion('${id}')" class="btn btn-sm btn-success">Save</button>`;
                    
                    t.innerHTML += `<tr>
                        <td>${d.createdAt?.toDate().toLocaleDateString() || 'New'}</td>
                        <td><strong>${d.patientName}</strong></td>
                        <td>${d.questionText}</td>
                        <td>${status}</td>
                        <td>${action}</td>
                    </tr>`;
                });
            } catch(e) { console.error(e); }
        }

        window.answerQuestion = async function(id) {
            const ans = document.getElementById('ans-' + id).value;
            if(!ans) return alert('Enter an answer');
            await window.updateDoc(window.doc(window.db, "questions", id), {
                answerText: ans,
                answered: true
            });
            showToast("Question answered!");
            fetchQuestions();
        }

        async function fetchReviews() {
            const t = document.getElementById('reviews-table');
            t.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
            try {
                const q = window.query(window.collection(window.db, "reviews"), window.orderBy("createdAt", "desc"));
                const snap = await window.getDocs(q);
                t.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    const status = d.approved ? '<span class="badge badge-success">Live</span>' : '<span class="badge badge-warning">Pending</span>';
                    const action = d.approved ? '' : `<button onclick="approveReview('${id}')" class="btn btn-sm btn-success">Approve</button>`;
                    
                    t.innerHTML += `<tr>
                        <td><strong>${d.patientName}</strong></td>
                        <td>${'★'.repeat(d.rating)}</td>
                        <td>${d.comment}</td>
                        <td>${status}</td>
                        <td>${action} <button onclick="deleteReview('${id}')" class="btn btn-sm btn-danger"><i data-lucide="trash-2" style="width:14px;height:14px"></i></button></td>
                    </tr>`;
                });
                lucide.createIcons();
            } catch(e) { console.error(e); }
        }

        window.approveReview = async function(id) {
            await window.updateDoc(window.doc(window.db, "reviews", id), { approved: true });
            showToast("Review approved & live!");
            fetchReviews();
        }
        
        window.deleteReview = async function(id) {
            if(!confirm('Delete this review?')) return;
            await window.deleteDoc(window.doc(window.db, "reviews", id));
            showToast("Review deleted!");
            fetchReviews();
        }

        async function fetchBlogs() {
            const t = document.getElementById('blogs-table');
            t.innerHTML = '<tr><td colspan="3">Loading...</td></tr>';
            try {
                const q = window.query(window.collection(window.db, "blogs"), window.orderBy("date", "desc"));
                const snap = await window.getDocs(q);
                t.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    t.innerHTML += `<tr>
                        <td><strong>${d.title}</strong></td>
                        <td><span class="badge">${d.category}</span></td>
                        <td><button onclick="deleteBlog('${doc.id}')" class="btn btn-sm btn-danger">Delete</button></td>
                    </tr>`;
                });
            } catch(e) { console.error(e); }
        }

        window.addBlog = async function(e) {
            e.preventDefault();
            const payload = {
                title: document.getElementById('b-title').value,
                category: document.getElementById('b-category').value,
                image: document.getElementById('b-image').value,
                excerpt: document.getElementById('b-excerpt').value,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            };
            await window.addDoc(window.collection(window.db, "blogs"), payload);
            showToast("Blog published!");
            e.target.reset();
            fetchBlogs();
        }

        window.deleteBlog = async function(id) {
            if(!confirm('Delete this blog?')) return;
            await window.deleteDoc(window.doc(window.db, "blogs", id));
            showToast("Blog deleted!");
            fetchBlogs();
        }
    </script>
</body>
</html>
